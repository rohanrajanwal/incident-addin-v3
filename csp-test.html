<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSP Probe</title>
  <style>
    * { box-sizing: border-box; -webkit-text-size-adjust: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 16px; background: #0f1f3a; color: #e6edf3; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { font-size: 12px; color: #9fb3c8; margin: 0 0 16px; }
    .verdict { font-size: 15px; font-weight: 700; padding: 12px; border-radius: 10px; margin-bottom: 16px; line-height: 1.4; }
    .v-allow { background: #14432a; color: #7ee7a6; border: 1px solid #1f7a44; }
    .v-block { background: #4a1620; color: #ff9aa9; border: 1px solid #7a1f30; }
    .v-mixed { background: #46380f; color: #ffd479; border: 1px solid #7a5d1f; }
    .row { background: #16294a; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .row .label { font-size: 13px; font-weight: 600; }
    .row .url { font-size: 11px; color: #9fb3c8; word-break: break-all; margin: 2px 0 8px; }
    .badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .b-ok { background: #1f7a44; color: #d6ffe6; }
    .b-blk { background: #7a1f30; color: #ffd6dd; }
    .b-err { background: #5a5a5a; color: #eee; }
    .b-run { background: #2a4a7a; color: #cfe2ff; }
    button { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border: none; border-radius: 10px; background: #2f6df0; color: #fff; margin-top: 8px; }
    pre { background: #0a1626; padding: 10px; border-radius: 8px; font-size: 10px; overflow:auto; color:#9fb3c8; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Incident Add-in — CSP Probe</h1>
  <p class="sub">Tests whether this WebView can reach external hosts. Screenshot the result.</p>
  <div id="verdict" class="verdict v-run">Running…</div>
  <div id="rows"></div>
  <button onclick="runProbe()">Re-run</button>
  <pre id="raw"></pre>

<script>
  // Benign/public hosts only — no internal endpoints committed.
  var HOSTS = [
    ['MyGeotab host (control — should pass)', 'https://alpha.geotab.com/'],
    ['geotab.com domain',                     'https://www.geotab.com/favicon.ico'],
    ['Arbitrary external (GitHub)',           'https://api.github.com/zen'],
    ['Arbitrary external (Google)',           'https://www.google.com/favicon.ico']
  ];

  var violations = {};
  document.addEventListener('securitypolicyviolation', function (e) {
    violations[e.blockedURI] = e.violatedDirective;
  });

  function badge(cls, text) { return '<span class="badge ' + cls + '">' + text + '</span>'; }

  async function probeOne(url) {
    try {
      await fetch(url, { mode: 'no-cors', cache: 'no-store' });
      return { state: 'ok' };
    } catch (e) {
      await new Promise(function (r) { setTimeout(r, 80); });
      var origin = url; try { origin = new URL(url).origin; } catch (_) {}
      var hitKey = Object.keys(violations).find(function (k) {
        return url.indexOf(k) === 0 || k.indexOf(origin) === 0 || origin.indexOf(k) === 0;
      });
      if (hitKey) return { state: 'blocked', directive: violations[hitKey] };
      return { state: 'error', name: e.name };
    }
  }

  async function runProbe() {
    violations = {};
    document.getElementById('verdict').className = 'verdict v-run';
    document.getElementById('verdict').textContent = 'Running…';
    var rows = document.getElementById('rows');
    rows.innerHTML = '';
    var results = [];
    for (var i = 0; i < HOSTS.length; i++) {
      var label = HOSTS[i][0], url = HOSTS[i][1];
      var div = document.createElement('div');
      div.className = 'row';
      div.innerHTML = '<div class="label">' + label + '</div><div class="url">' + url + '</div>' + badge('b-run', 'testing…');
      rows.appendChild(div);
      var res = await probeOne(url);
      results.push({ label: label, url: url, res: res });
      var b = res.state === 'ok' ? badge('b-ok', 'REACHABLE')
            : res.state === 'blocked' ? badge('b-blk', 'CSP-BLOCKED (' + res.directive + ')')
            : badge('b-err', 'error (' + res.name + ')');
      div.innerHTML = '<div class="label">' + label + '</div><div class="url">' + url + '</div>' + b;
    }

    // Top-line verdict based on the two arbitrary-external probes + geotab.com.
    var ext = results.slice(2).filter(function (r) { return r.res.state === 'ok'; }).length;
    var geo = results[1].res.state === 'ok';
    var v = document.getElementById('verdict');
    if (ext > 0) { v.className = 'verdict v-allow'; v.textContent = 'EXTERNAL CALLS ALLOWED — real-time cloud proxy is viable (Branch 1).'; }
    else if (geo) { v.className = 'verdict v-mixed'; v.textContent = 'Only *.geotab.com reachable — host the proxy under a geotab.com domain (Branch 1, constrained).'; }
    else { v.className = 'verdict v-block'; v.textContent = 'EXTERNAL CALLS BLOCKED by CSP — need a Drive-team allowlist or async back-office (Branch 2).'; }

    document.getElementById('raw').textContent =
      'origin: ' + location.origin + '\n' +
      'ancestorOrigins: ' + (location.ancestorOrigins ? Array.prototype.join.call(location.ancestorOrigins, ', ') : 'n/a') + '\n' +
      'violations: ' + JSON.stringify(violations, null, 1);
  }

  runProbe();
</script>
</body>
</html>
